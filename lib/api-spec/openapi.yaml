openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cleaning company app API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management operations
  - name: houses
    description: House operations
  - name: assignments
    description: Daily assignment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all employees (boss only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user info (role, username)
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/set-role:
    post:
      operationId: setUserRole
      tags: [users]
      summary: Set role for current user (called on sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List assignments (employees see their own, boss sees all)
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Create a new assignment (boss only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentBody"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{id}:
    get:
      operationId: getAssignment
      tags: [assignments]
      summary: Get a single assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
    put:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignmentBody"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
    delete:
      operationId: deleteAssignment
      tags: [assignments]
      summary: Delete an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assignments/today:
    get:
      operationId: getTodayAssignments
      tags: [assignments]
      summary: Get today's assignments for the current user (employees) or all (boss)
      responses:
        "200":
          description: Today's assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"

  /houses:
    get:
      operationId: listHouses
      tags: [houses]
      summary: List all houses
      responses:
        "200":
          description: List of houses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/House"
    post:
      operationId: createHouse
      tags: [houses]
      summary: Create a new house
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHouseBody"
      responses:
        "201":
          description: Created house
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/House"

  /houses/{id}:
    get:
      operationId: getHouse
      tags: [houses]
      summary: Get a single house
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: House
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/House"
    put:
      operationId: updateHouse
      tags: [houses]
      summary: Update a house
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHouseBody"
      responses:
        "200":
          description: Updated house
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/House"
    delete:
      operationId: deleteHouse
      tags: [houses]
      summary: Delete a house
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /houses/{id}/notes:
    patch:
      operationId: updateHouseNotes
      tags: [houses]
      summary: Update notes for a house (editable by anyone)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHouseNotesBody"
      responses:
        "200":
          description: Updated house
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/House"

  /houses/stats:
    get:
      operationId: getHouseStats
      tags: [houses]
      summary: Get house statistics summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AppUser:
      type: object
      properties:
        clerkId:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [boss, employee]
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
      required:
        - clerkId
        - username
        - email
        - role

    SetRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [boss, employee]
      required:
        - role

    Assignment:
      type: object
      properties:
        id:
          type: integer
        houseId:
          type: integer
        houseName:
          type: string
        houseAddress:
          type: string
        assignedToClerkId:
          type: string
          nullable: true
        assignedToUsername:
          type: string
          nullable: true
        date:
          type: string
        timeSlot:
          type: string
        notes:
          type: string
          nullable: true
        guestCount:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, normal, high]
        createdAt:
          type: string
      required:
        - id
        - houseId
        - houseName
        - houseAddress
        - date
        - timeSlot
        - status
        - priority
        - createdAt

    CreateAssignmentBody:
      type: object
      properties:
        houseId:
          type: integer
        assignedToClerkId:
          type: string
          nullable: true
        date:
          type: string
        timeSlot:
          type: string
        notes:
          type: string
          nullable: true
        guestCount:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, normal, high]
      required:
        - houseId
        - date
        - timeSlot
        - status
        - priority

    UpdateAssignmentBody:
      type: object
      properties:
        assignedToClerkId:
          type: string
          nullable: true
        date:
          type: string
        timeSlot:
          type: string
        notes:
          type: string
          nullable: true
        guestCount:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, normal, high]

    House:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        cleaningFrequency:
          type: string
          enum: [weekly, biweekly, monthly]
        size:
          type: string
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        entryCode:
          type: string
          nullable: true
        mapsLink:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
      required:
        - id
        - name
        - address
        - city
        - state
        - zipCode
        - latitude
        - longitude
        - ownerName
        - cleaningFrequency
        - status
        - createdAt

    CreateHouseBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        cleaningFrequency:
          type: string
          enum: [weekly, biweekly, monthly]
        size:
          type: string
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        entryCode:
          type: string
          nullable: true
        mapsLink:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
      required:
        - name
        - address
        - city
        - state
        - zipCode
        - latitude
        - longitude
        - ownerName
        - status

    UpdateHouseBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        cleaningFrequency:
          type: string
          enum: [weekly, biweekly, monthly]
        size:
          type: string
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        entryCode:
          type: string
          nullable: true
        mapsLink:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]

    UpdateHouseNotesBody:
      type: object
      properties:
        notes:
          type: string
          nullable: true
      required:
        - notes

    HouseStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        inactive:
          type: integer
        weekly:
          type: integer
        biweekly:
          type: integer
        monthly:
          type: integer
        totalAssignmentsToday:
          type: integer
      required:
        - total
        - active
        - inactive
        - weekly
        - biweekly
        - monthly
        - totalAssignmentsToday
